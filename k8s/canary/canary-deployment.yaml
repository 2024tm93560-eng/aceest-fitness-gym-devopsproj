# ─────────────────────────────────────────────────────────────────────────────
# Canary Release - ACEest Fitness
# Strategy: Route ~10% traffic to new version, 90% to stable.
# Achieved by running 1 canary pod alongside 9 stable pods (ratio = 1:9).
# Rollback: Scale canary to 0 replicas.
# ─────────────────────────────────────────────────────────────────────────────

# ── Stable Deployment (90% traffic) ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest
  labels:
    app: aceest-fitness
    track: stable
spec:
  replicas: 9                   # 90% of traffic
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
    spec:
      containers:
        - name: aceest-fitness
          image: chithra93560/aceest-fitness:stable
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

---
# ── Canary Deployment (10% traffic) ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
  namespace: aceest
  labels:
    app: aceest-fitness
    track: canary
spec:
  replicas: 1                   # 10% of traffic
  selector:
    matchLabels:
      app: aceest-fitness
      track: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: canary
    spec:
      containers:
        - name: aceest-fitness
          image: chithra93560/aceest-fitness:latest
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

---
# ── Shared Service (routes to both stable + canary by label: app) ─────────────
# Both deployments share the label app=aceest-fitness so the service balances
# traffic proportional to replica count.
apiVersion: v1
kind: Service
metadata:
  name: aceest-service
  namespace: aceest
spec:
  selector:
    app: aceest-fitness        # Matches BOTH stable and canary pods
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
