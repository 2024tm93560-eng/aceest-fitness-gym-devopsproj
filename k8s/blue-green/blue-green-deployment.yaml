# ─────────────────────────────────────────────────────────────────────────────
# Blue-Green Deployment - ACEest Fitness
# Strategy: Two identical environments. Switch traffic from Blue → Green instantly.
# Rollback: Switch service selector back to 'blue' anytime.
# ─────────────────────────────────────────────────────────────────────────────

# ── Blue Deployment (Current Stable) ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
  namespace: aceest
  labels:
    app: aceest-fitness
    version: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      version: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: blue
    spec:
      containers:
        - name: aceest-fitness
          image: chithra93560/aceest-fitness:stable
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

---
# ── Green Deployment (New Version — standby) ─────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  namespace: aceest
  labels:
    app: aceest-fitness
    version: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      version: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: green
    spec:
      containers:
        - name: aceest-fitness
          image: chithra93560/aceest-fitness:latest
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

---
# ── Service — points to Blue by default ──────────────────────────────────────
# To switch to Green: kubectl patch service aceest-service -p '{"spec":{"selector":{"version":"green"}}}'
# To rollback to Blue: kubectl patch service aceest-service -p '{"spec":{"selector":{"version":"blue"}}}'
apiVersion: v1
kind: Service
metadata:
  name: aceest-service
  namespace: aceest
  annotations:
    description: "Switch selector version: blue or green for zero-downtime cutover"
spec:
  selector:
    app: aceest-fitness
    version: blue          # ← Change to 'green' to switch traffic
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
