name: ACEest Fitness CI/CD Pipeline

on:
  push:
    branches: [ "main", "release", "canary" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: pip install -r requirements.txt pytest-cov
      - name: Run Pytest with Coverage
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract short SHA
        id: vars
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:v1.0.0
            ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:${{ steps.vars.outputs.SHA_SHORT }}

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate coverage
        run: |
          pip install -r requirements.txt pytest-cov
          pytest tests/ --cov=. --cov-report=xml -v
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Remove sonar-project.properties if exists
        run: rm -f sonar-project.properties
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=aceest-fitness-gym-devopsproj
            -Dsonar.organization=2024tm93560-eng
            -Dsonar.projectName=ACEest-Fitness-Gym
            -Dsonar.projectVersion=2.0.0
            -Dsonar.sources=ACEest_Fitness.py,ACEest_Fitness_v2.py,app.py
            -Dsonar.tests=tests
            -Dsonar.test.inclusions=tests/test_aceest.py
            -Dsonar.language=py
            -Dsonar.python.version=3.11
            -Dsonar.python.coverage.reportPaths=coverage.xml
