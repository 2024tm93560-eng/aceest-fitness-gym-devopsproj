name: ACEest Fitness CI/CD Pipeline

on:
  push:
    branches: [ "main", "release", "canary" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Job 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run Pytest with Coverage
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 2: Build & Push Docker Image ──────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        id: vars
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push image (v1.0.0)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:v1.0.0
            ${{ secrets.DOCKERHUB_USERNAME }}/aceest-fitness:${{ steps.vars.outputs.SHA_SHORT }}

  # ── Job 3: SonarQube Analysis ─────────────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python & Coverage
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Generate coverage for SonarQube
        run: |
          pip install -r requirements.txt pytest-cov
          pytest tests/ --cov=. --cov-report=xml -v

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=aceest-fitness-gym
            -Dsonar.projectName="ACEest Fitness & Gym"
            -Dsonar.sources=.
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=**/__pycache__/**,**/*.pyc,venv/**,versions/**
