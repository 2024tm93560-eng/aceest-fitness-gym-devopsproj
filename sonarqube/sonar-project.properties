# ─────────────────────────────────────────────────────────────────────────────
# SonarQube Scanner Configuration
# File: sonar-project.properties
# Place this in the project root directory
# ─────────────────────────────────────────────────────────────────────────────

# Project identification
sonar.projectKey=aceest-fitness-gym
sonar.projectName=ACEest Fitness & Gym Management System
sonar.projectVersion=2.0.0

# Source code paths
sonar.sources=app
sonar.tests=tests
sonar.language=py

# Python-specific settings
sonar.python.version=3.11

# Coverage reports (generated by pytest-cov)
sonar.python.coverage.reportPaths=reports/coverage.xml
sonar.python.xunit.reportPath=reports/pytest-results.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,venv/**,reports/**

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate settings (configure in SonarQube UI)
# Recommended thresholds:
#   - Coverage > 80%
#   - Duplicated Lines < 3%
#   - Maintainability Rating = A
#   - Reliability Rating = A
#   - Security Rating = A
#   - Code Smells < 10
#   - Bugs = 0
#   - Vulnerabilities = 0
